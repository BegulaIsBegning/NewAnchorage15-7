<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" href="favicon.png">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Welcome to Anchorage</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="brand">
      <div>
        <h1>Anchorage</h1>
        <div class="brand-sub">Anchorage Broadcasting Service</div>
      </div>
    </div>
    <div class="topbar-clock" id="clockDisplay">--:--:--</div>
  </div>

  <!-- SCAN SECTION -->
  <section id="scanSection">
    <div class="scene" id="channelGrid">
      <div class="mini-screen">
        <div class="preview-placeholder"></div>
        <div class="screen-label">
          <span class="scrolling-meta">CH-01 // SIGNAL_STABLE</span>
          <span class="status-tag">LIVE</span>
        </div>
      </div>
      <div class="mini-screen">
        <div class="preview-placeholder"></div>
        <div class="screen-label">
          <span class="scrolling-meta">CH-02 // SIGNAL_LOST</span>
          <span class="status-tag" style="color: var(--red); border-color: var(--red); animation:none; opacity:.5;">OFFLINE</span>
        </div>
      </div>
    </div>

    <div class="ch-label" style="margin-top:20px;">▸ Available Channels</div>
    <ul id="channelList" class="ch-list"></ul>
    <p id="noChannels" class="no-ch hidden">Waiting for signals.</p>
  </section>

  <!-- TV SECTION -->
  <section id="tvSection" class="hidden">
    <div class="tv-wrap">
      <div class="tv-bezel">
        <div class="tv-brand">Anchorage 1.2.45 (25.4.2026)</div>
        <div class="tv-screen" id="tvScreen">
          <video id="tvVideo" playsinline autoplay></video>
          <div class="tv-noise"></div>
          <div id="tvOverlay" class="tv-overlay hidden">
            <p id="tvOverlayMsg">No Signal</p>
          </div>
        </div>
        <div class="tv-bottom">
          <div class="tv-leds">
            <div class="led led-g"></div>
            <div class="led led-r"></div>
          </div>
          <span class="tuned" id="tunedChannel"></span>
          <div class="tv-btns">
            <div class="vol-row">
              <span>VOL</span>
              <input type="range" id="volControl" min="0" max="1" step="0.01" value="1"/>
            </div>
            <button class="btn-back" id="btnBack">◀ Channels</button>
          </div>
        </div>
      </div>
      <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Waiting for Signals</span>
      </div>
    </div>
  </section>

</div>
<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
